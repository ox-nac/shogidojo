<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>将棋 - Shogi Game</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: #1e1810;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  padding: 20px 12px;
  color: #e8d5b0;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

/* レイアウト */
.board-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* プレイヤー行 */
.player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 50px;
  max-width: 100%;
}
.player-row.gote-row {
  flex-direction: row-reverse;
}

.turn-label {
  font-size: 12px;
  font-weight: bold;
  padding: 3px 10px;
  border-radius: 4px;
  background: rgba(80,50,25,0.5);
  border: 1px solid rgba(139,115,85,0.4);
  opacity: 0.35;
  white-space: nowrap;
}
.turn-label.on { opacity: 1; border-color: #8B7355; }
.gote-row .turn-label { transform: rotate(180deg); }

/* 持ち駒エリア */
.hand-area {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
  min-height: 56px;
  flex: 1;
}
.gote-row .hand-area { flex-direction: row-reverse; }
.hand-empty { font-size: 13px; opacity: 0.4; }
.gote-row .hand-empty { transform: rotate(180deg); }
.gote-row .resign-btn { transform: rotate(180deg); }

/* ===== タイマー ===== */
.timer-box {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  background: rgba(0,0,0,0.35);
  border: 1.5px solid #5a4030;
  border-radius: 5px;
  min-width: 85px;
  justify-content: center;
  flex-shrink: 0;
}
.timer-box.active {
  border-color: #c49a4a;
  background: rgba(80,50,20,0.5);
}
.timer-box.danger {
  border-color: #c0392b;
  background: rgba(120,30,20,0.3);
}
.timer-icon {
  font-size: 13px;
  opacity: 0.7;
}
.timer-time {
  font-size: 18px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
  color: #e8d5b0;
  font-family: "Courier New", "Consolas", monospace;
}
.timer-box.danger .timer-time {
  color: #e74c3c;
}
.gote-row .timer-box {
  transform: rotate(180deg);
}

/* ===== 五角形駒（参考画像準拠） ===== */
.koma {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 42px;
  height: 48px;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.45));
}

/* 外側の五角形（枠線の役割）
   頂点(上中央) → 左肩(上の角) → 左下 → 右下 → 右肩
   肩は底辺より内側（狭い）= 上に向かってスリムに */
.koma-bg {
  position: absolute;
  inset: 0;
  clip-path: polygon(50% 8%, 10% 30%, 0% 100%, 100% 100%, 90% 30%);
  background: linear-gradient(175deg, #8a6d3a 0%, #6b5028 100%);
}

/* 内側の五角形（木目グラデーション） */
.koma-bg::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 1px;
  clip-path: polygon(50% 9%, 12% 31%, 2% 100%, 98% 100%, 88% 31%);
  background:
    linear-gradient(175deg,
      #f0d48a 0%,
      #e6c36e 15%,
      #d4a84e 35%,
      #c89840 55%,
      #ba8735 75%,
      #a67328 100%
    );
  box-shadow: inset 0 -4px 8px rgba(120,80,20,0.2),
              inset 0 2px 4px rgba(255,240,180,0.3);
}

/* 駒の文字 */
.koma-text {
  position: relative;
  z-index: 2;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  font-size: 24px;
  font-weight: 900;
  color: #1a1408;
  line-height: 1;
  margin-top: 14px;
  text-shadow: 0 0.5px 0 rgba(180,150,80,0.3);
  /* 筆文字風のレタリング */
  -webkit-text-stroke: 0.3px #2a1a08;
}

.koma.promoted .koma-text {
  color: #8b1a1a;
  -webkit-text-stroke: 0.3px #5a0a0a;
}
.koma.gote { transform: translate(-50%, -50%) rotate(180deg); }

/* ===== 持ち駒 ===== */
.hand-koma {
  position: relative;
  width: 42px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.4));
}
.hand-koma:hover { transform: scale(1.08); }
.hand-koma.gote-hk { transform: rotate(180deg); }
.hand-koma.gote-hk:hover { transform: rotate(180deg) scale(1.08); }

/* 選択時は少し明るく */
.hand-koma.sel .koma-bg::after {
  background:
    linear-gradient(175deg,
      #f8e0a0 0%,
      #f0d080 15%,
      #e0b860 35%,
      #d4a850 55%,
      #c89840 75%,
      #b88830 100%
    );
}

.hand-count {
  position: absolute;
  bottom: -2px; right: -4px;
  font-size: 11px; font-weight: bold; color: #fff;
  background: #5a3818; border-radius: 50%;
  width: 17px; height: 17px;
  display: flex; align-items: center; justify-content: center;
  z-index: 5; pointer-events: none;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
.hand-koma.gote-hk .hand-count {
  transform: rotate(180deg);
  bottom: auto; top: -2px;
}

/* 盤 */
.board-frame {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
}
.col-labels { display: flex; margin-bottom: 1px; }
.col-labels span {
  width: 52px; text-align: center;
  font-size: 13px; font-weight: bold; color: #a08050;
}
.board-body { display: flex; align-items: stretch; position: relative; }
.row-labels { display: flex; flex-direction: column; margin-left: 3px; }
.row-labels span {
  height: 52px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #a08050; width: 20px;
}

table.board {
  border-collapse: collapse;
  border: 3px solid #6b4423;
  background-color: #DEB887;
}
table.board td {
  width: 52px; height: 52px;
  border: 1px solid #a08050;
  text-align: center; vertical-align: middle;
  cursor: pointer; position: relative;
  padding: 0;
  background-color: #DEB887;
}
table.board td:hover { background-color: #d4a867; }
table.board td.sel { background-color: #c49a4a !important; }
table.board td.mv::after {
  content: ""; position: absolute;
  top: 50%; left: 50%;
  width: 16px; height: 16px; margin: -8px 0 0 -8px;
  border-radius: 50%; background: rgba(56,130,50,0.55);
  pointer-events: none; z-index: 3;
}
table.board td.cap { background-color: rgba(200,80,60,0.15) !important; }
table.board td.cap::after {
  content: ""; position: absolute;
  top: 50%; left: 50%;
  width: 16px; height: 16px; margin: -8px 0 0 -8px;
  border-radius: 50%; background: rgba(200,60,40,0.5);
  pointer-events: none; z-index: 3;
}

/* ボタン */
.reset-btn {
  padding: 9px 26px;
  background: linear-gradient(135deg, #6b4423, #8B5E3C);
  color: #e8d5b0; border: 2px solid #8B7355;
  border-radius: 7px; font-size: 15px; font-weight: bold;
  cursor: pointer;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  margin-top: 6px;
}
.reset-btn:hover { background: linear-gradient(135deg, #8B5E3C, #a06e48); }

/* 投了ボタン */
.resign-btn {
  padding: 4px 12px;
  background: linear-gradient(135deg, #5a1a1a, #7a2a2a);
  color: #e8d5b0;
  border: 1.5px solid #8B4040;
  border-radius: 5px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  flex-shrink: 0;
}
.resign-btn:hover { background: linear-gradient(135deg, #7a2a2a, #943535); }

/* ボタン行 */
.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}

/* 勝ちダイアログ */
.win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.win-overlay.show { display: flex; }
.win-dialog {
  background: linear-gradient(135deg, #3d2e1f, #2a1f14);
  border: 2px solid #c49a4a;
  border-radius: 12px;
  padding: 30px 44px;
  text-align: center;
  box-shadow: 0 16px 50px rgba(0,0,0,0.5);
  transition: transform 0.15s;
}
.win-overlay.gote-win .win-dialog {
  transform: rotate(180deg);
}
.win-text {
  font-size: 26px;
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 20px;
  text-shadow: 0 0 15px rgba(255,215,0,0.3);
}
.win-ok-btn {
  padding: 10px 36px;
  font-size: 18px;
  font-weight: bold;
  font-family: "Yu Mincho", serif;
  background: linear-gradient(135deg, #6b4423, #8B5E3C);
  color: #e8d5b0;
  border: 2px solid #8B7355;
  border-radius: 7px;
  cursor: pointer;
}
.win-ok-btn:hover { background: linear-gradient(135deg, #8B5E3C, #a06e48); }

/* 成りダイアログ */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center; align-items: center; z-index: 999;
}
.overlay.show { display: flex; }
.dialog {
  background: linear-gradient(135deg, #3d2e1f, #2a1f14);
  border: 2px solid #8B7355; border-radius: 10px;
  padding: 24px 36px; text-align: center;
  box-shadow: 0 16px 50px rgba(0,0,0,0.5);
  transition: transform 0.15s;
}
.overlay.gote-turn .dialog {
  transform: rotate(180deg);
}
.dialog p { font-size: 19px; font-weight: bold; margin-bottom: 18px; color: #e8d5b0; }
.dialog button {
  padding: 10px 30px; margin: 0 8px;
  font-size: 17px; font-weight: bold;
  font-family: "Yu Mincho", serif;
  border: 2px solid #8B7355; border-radius: 7px; cursor: pointer;
}
.btn-y { background: #b22222; color: #fff; }
.btn-y:hover { background: #d42a2a; }
.btn-n { background: #4a3828; color: #e8d5b0; }
.btn-n:hover { background: #5a4838; }

/* 時間切れダイアログ */
.time-up-banner {
  display: none;
  font-size: 26px;
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 10px;
}

/* 警告トースト */

/* ===== 検討モード ===== */
.review-bar {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.review-bar.show { display: flex; }

.review-btn {
  padding: 6px 18px;
  background: linear-gradient(135deg, #4a3520, #6b4423);
  color: #e8d5b0;
  border: 1.5px solid #8B7355;
  border-radius: 5px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  min-width: 44px;
  text-align: center;
}
.review-btn:hover { background: linear-gradient(135deg, #6b4423, #8B5E3C); }
.review-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.review-info {
  font-size: 14px;
  color: #c4a875;
  min-width: 80px;
  text-align: center;
}

.review-exit-btn {
  padding: 5px 16px;
  background: linear-gradient(135deg, #5a1a1a, #7a2a2a);
  color: #e8d5b0;
  border: 1.5px solid #8B4040;
  border-radius: 5px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  margin-left: 8px;
}
.review-exit-btn:hover { background: linear-gradient(135deg, #7a2a2a, #943535); }

.review-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 4;
  cursor: default;
}
.board-area { position: relative; }
/* 検討モード中は投了ボタン非表示 */
.review-mode .resign-btn { display: none; }
.review-mode .timer-box { opacity: 0.3; }

/* 投了動画カットイン */
.video-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 1100;
}
.video-overlay.show { display: flex; }
.video-overlay video {
  max-width: 85vw;
  max-height: 70vh;
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.warning-toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: rgba(40, 25, 15, 0.95);
  border: 2px solid #c0392b;
  border-radius: 10px;
  padding: 20px 32px;
  text-align: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.warning-toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: auto;
}
.warning-toast.gote-warn {
  transform: translate(-50%, -50%) scale(1) rotate(180deg);
}
.warning-text {
  font-size: 17px;
  font-weight: bold;
  color: #f0c0a0;
  line-height: 1.5;
}
.warning-icon {
  font-size: 28px;
  margin-bottom: 6px;
}

/* iPad・タブレット（デフォルトを大きめに） */

/* タイトル画面 */
.title-screen { gap: 36px; }
.title-logo { font-size: 80px; letter-spacing: 20px; }
.title-sub { font-size: 20px; letter-spacing: 5px; margin-top: -12px; }
.name-inputs { max-width: 460px; gap: 18px; }
.name-label { font-size: 18px; min-width: 110px; }
.name-input { font-size: 20px; padding: 12px 16px; }
.furigoma-area { min-width: 460px; padding: 28px; gap: 22px; }
.furigoma-title { font-size: 24px; letter-spacing: 5px; }
.furigoma-pieces { gap: 14px; }
.furi-koma { width: 68px; height: 76px; }
.furi-koma .koma-text { font-size: 34px; margin-top: 20px; }
.furigoma-result { font-size: 22px; }
.furi-btn { font-size: 24px; padding: 14px 48px; }
.furi-desc { font-size: 16px !important; max-width: 420px !important; }
.start-btn { font-size: 26px; padding: 16px 60px; }

/* 盤面 */
table.board td { width: 75px; height: 75px; }
.koma { width: 60px; height: 68px; }
.koma-text { font-size: 34px; margin-top: 18px; }
.hand-koma { width: 56px; height: 64px; }
.hand-koma .koma-text { font-size: 30px; margin-top: 16px; }
.col-labels span { width: 75px; font-size: 16px; }
.row-labels span { height: 75px; font-size: 16px; width: 24px; }
.turn-label { font-size: 13px; padding: 3px 12px; }
.timer-time { font-size: 20px; }
.timer-icon { font-size: 14px; }
.timer-box { padding: 4px 12px; min-width: 95px; }
.hand-count { width: 20px; height: 20px; font-size: 13px; }
.hand-empty { font-size: 16px; }
.reset-btn { font-size: 16px; padding: 10px 28px; }
.resign-btn { font-size: 13px; padding: 5px 14px; }
.warning-text { font-size: 20px; }
.warning-icon { font-size: 34px; }
.dialog p { font-size: 24px; }
.dialog button { font-size: 22px; padding: 14px 38px; }
table.board { border: 4px solid #6b4423; }
body { padding: 12px 8px; }

/* PC・大画面 */
@media (min-width: 1100px) {
  table.board td { width: 64px; height: 64px; }
  .koma { width: 52px; height: 58px; }
  .koma-text { font-size: 28px; margin-top: 16px; }
  .hand-koma { width: 48px; height: 54px; }
  .hand-koma .koma-text { font-size: 26px; margin-top: 14px; }
  .col-labels span { width: 64px; font-size: 15px; }
  .row-labels span { height: 64px; font-size: 15px; }
}

/* スマホ */
@media (max-width: 600px) {
  table.board td { width: 40px; height: 40px; }
  .koma { width: 32px; height: 36px; }
  .koma-text { font-size: 17px; margin-top: 10px; }
  .hand-koma { width: 30px; height: 34px; }
  .hand-koma .koma-text { font-size: 15px; margin-top: 9px; }
  .col-labels span { width: 40px; font-size: 10px; }
  .row-labels span { height: 40px; font-size: 10px; }
  .timer-time { font-size: 15px; }
  .timer-box { min-width: 70px; padding: 3px 8px; }
  .turn-label { font-size: 10px; padding: 2px 8px; }
  .hand-count { width: 15px; height: 15px; font-size: 10px; }
  .hand-empty { font-size: 12px; }
  .reset-btn { font-size: 13px; padding: 7px 18px; }
  .resign-btn { font-size: 10px; padding: 3px 8px; }
}

}

/* 振り駒アニメーション */
.furi-koma.shaking {

}
@keyframes furiShake {
  0% { transform: rotate(-8deg) translateY(-2px); }
  25% { transform: rotate(8deg) translateY(2px); }

}

}

  60% { transform: translateY(3px) scale(0.97); }
  100% { transform: translateY(0) scale(1); }
}

<script>
(function(){
"use strict";

var PN={
  K:"王",k:"玉",R:"飛",r:"飛",B:"角",b:"角",
  G:"金",g:"金",S:"銀",s:"銀",N:"桂",n:"桂",
  L:"香",l:"香",P:"歩",p:"歩",
  PR:"龍",pr:"龍",PB:"馬",pb:"馬",
  PS:"全",ps:"全",PN:"圭",pn:"圭",
  PL:"杏",pl:"杏",PP:"と",pp:"と"
};
var PRO={R:"PR",r:"pr",B:"PB",b:"pb",S:"PS",s:"ps",N:"PN",n:"pn",L:"PL",l:"pl",P:"PP",p:"pp"};
var UNP={PR:"R",pr:"r",PB:"B",pb:"b",PS:"S",ps:"s",PN:"N",pn:"n",PL:"L",pl:"l",PP:"P",pp:"p"};
var RL=["一","二","三","四","五","六","七","八","九"];
var INIT=[
  ["l","n","s","g","k","g","s","n","l"],
  [null,"r",null,null,null,null,null,"b",null],
  ["p","p","p","p","p","p","p","p","p"],
  [null,null,null,null,null,null,null,null,null],
  [null,null,null,null,null,null,null,null,null],
  [null,null,null,null,null,null,null,null,null],
  ["P","P","P","P","P","P","P","P","P"],
  [null,"B",null,null,null,null,null,"R",null],
  ["L","N","S","G","K","G","S","N","L"]
];

var TIMER_TOTAL = 10 * 60; // 10分（秒）

/* 駒音 */
var komaSound = new Audio("shogikoma.mp3");
function playKomaSound(){
  komaSound.currentTime = 0;
  komaSound.play().catch(function(){});
}

/* 王手音 */
var outeSound = new Audio("oute.mp3");
function playOuteSound(){
  outeSound.currentTime = 0;
  outeSound.play().catch(function(){});
}

/* 勝利音 */
var winSound = new Audio("shorisengen.mp3");
function playWinSound(){
  winSound.currentTime = 0;
  winSound.play().catch(function(){});
}

/* BGM */
var bgm = new Audio("bgm.mp3");
bgm.loop = true;
bgm.volume = 0.3;
var bgmStarted = false;
var bgmUnlocked = false;

/* iOS/iPad Safari対策: 最初のタッチでAudio再生をアンロック */
function unlockBGM(){
  if(bgmUnlocked) return;
  bgm.play().then(function(){
    bgm.pause();
    bgm.currentTime = 0;
    bgmUnlocked = true;
  }).catch(function(){});
}
document.addEventListener("touchstart", unlockBGM, {once: false});
document.addEventListener("click", unlockBGM, {once: false});

function startBGM(){
  if(!bgmStarted){
    bgm.currentTime = 0;
    bgm.play().catch(function(){});
    bgmStarted = true;
  }
}
function stopBGM(){
  bgm.pause();
  bgm.currentTime = 0;
  bgmStarted = false;
}

/* 警告トースト */
var $warn = document.getElementById("warn");
var $warnText = document.getElementById("warn-text");
var warnTimer = null;
function showWarning(msg){
  if(warnTimer) clearTimeout(warnTimer);
  $warnText.textContent = msg;
  // 後手の番なら逆さまに表示
  if(T === "gote"){
    $warn.classList.add("gote-warn");
  } else {
    $warn.classList.remove("gote-warn");
  }
  $warn.classList.add("show");
  warnTimer = setTimeout(function(){
    $warn.classList.remove("show");
    $warn.classList.remove("gote-warn");
  }, 1800);
}

function isS(p){return p!==null&&p===p.toUpperCase();}
function isG(p){return p!==null&&p!==p.toUpperCase();}
function isP(p){return p!==null&&p.length===2&&p[0].toLowerCase()==="p";}
function dn(p){return p?(PN[p]||p):"";}
function bp(p){return UNP[p]||p;}
function cap(p){if(!p)return null;var b=UNP[p]||p;return isS(p)?b.toLowerCase():b.toUpperCase();}
function cb(b){return b.map(function(r){return r.slice();});}

function komaHTML(piece, isGotePiece){
  var cls="koma";
  if(isGotePiece) cls+=" gote";
  if(isP(piece)) cls+=" promoted";
  return '<div class="'+cls+'"><div class="koma-bg"></div><span class="koma-text">'+dn(piece)+'</span></div>';
}

function gm(pc,row,col,bd){
  var mv=[],se=isS(pc),d=se?-1:1,b=bp(pc).toUpperCase(),pr=isP(pc);
  function a(r,c){if(r<0||r>8||c<0||c>8)return false;var t=bd[r][c];if(t&&((se&&isS(t))||(!se&&isG(t))))return false;mv.push([r,c]);return!t;}
  function ln(dr,dc){for(var i=1;i<=8;i++){if(!a(row+dr*i,col+dc*i))break;}}
  if(pr&&b!=="R"&&b!=="B"){a(row+d,col-1);a(row+d,col);a(row+d,col+1);a(row,col-1);a(row,col+1);a(row-d,col);return mv;}
  switch(b){
    case"K":for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++)if(dr||dc)a(row+dr,col+dc);break;
    case"R":ln(-1,0);ln(1,0);ln(0,-1);ln(0,1);if(pr){a(row-1,col-1);a(row-1,col+1);a(row+1,col-1);a(row+1,col+1);}break;
    case"B":ln(-1,-1);ln(-1,1);ln(1,-1);ln(1,1);if(pr){a(row-1,col);a(row+1,col);a(row,col-1);a(row,col+1);}break;
    case"G":a(row+d,col-1);a(row+d,col);a(row+d,col+1);a(row,col-1);a(row,col+1);a(row-d,col);break;
    case"S":a(row+d,col-1);a(row+d,col);a(row+d,col+1);a(row-d,col-1);a(row-d,col+1);break;
    case"N":a(row+d*2,col-1);a(row+d*2,col+1);break;
    case"L":ln(d,0);break;
    case"P":a(row+d,col);break;
  }
  return mv;
}
function gd(pc,bd,tn){
  var mv=[],b=pc.toUpperCase();
  for(var r=0;r<9;r++){for(var c=0;c<9;c++){
    if(bd[r][c])continue;
    if(b==="P"){var dup=false;for(var rr=0;rr<9;rr++){var pp=bd[rr][c];if(pp&&(pp==="P"||pp==="p")&&((tn==="sente"&&isS(pp))||(tn==="gote"&&isG(pp)))){dup=true;break;}}if(dup)continue;}
    if((b==="P"||b==="L")&&((tn==="sente"&&r===0)||(tn==="gote"&&r===8)))continue;
    if(b==="N"&&((tn==="sente"&&r<=1)||(tn==="gote"&&r>=7)))continue;
    mv.push([r,c]);
  }}
  return mv;
}
function cpr(pc,fr,tr){
  if(!pc||isP(pc))return false;var b=bp(pc).toUpperCase();
  if(b==="K"||b==="G")return false;if(!PRO[pc])return false;
  return isS(pc)?(fr<=2||tr<=2):(fr>=6||tr>=6);
}
function mpr(pc,tr){
  if(!pc)return false;var b=bp(pc).toUpperCase();
  if(isS(pc)){if((b==="P"||b==="L")&&tr===0)return true;if(b==="N"&&tr<=1)return true;}
  else{if((b==="P"||b==="L")&&tr===8)return true;if(b==="N"&&tr>=7)return true;}
  return false;
}
function ich(bd,tn){
  var kg=tn==="sente"?"K":"k",kr=-1,kc=-1;
  for(var r=0;r<9;r++)for(var c=0;c<9;c++)if(bd[r][c]===kg){kr=r;kc=c;}
  if(kr<0)return false;
  for(var r=0;r<9;r++)for(var c=0;c<9;c++){
    var p=bd[r][c];if(!p)continue;
    if(tn==="sente"&&isS(p))continue;if(tn==="gote"&&isG(p))continue;
    var ms=gm(p,r,c,bd);for(var i=0;i<ms.length;i++)if(ms[i][0]===kr&&ms[i][1]===kc)return true;
  }
  return false;
}
function lm(bd,fr,fc,tr,tc,pc,tn,pr){
  var nb=cb(bd);nb[tr][tc]=pr?PRO[pc]:pc;nb[fr][fc]=null;return!ich(nb,tn);
}
function ld(bd,pc,tr,tc,tn){
  var nb=cb(bd);nb[tr][tc]=pc;
  if(bp(pc).toUpperCase()==="P"){
    var op=tn==="sente"?"gote":"sente";
    if(ich(nb,op)){var ok=false;
      for(var r=0;r<9&&!ok;r++)for(var c=0;c<9&&!ok;c++){
        var pp=nb[r][c];if(!pp)continue;
        if(op==="sente"&&!isS(pp))continue;if(op==="gote"&&!isG(pp))continue;
        var ms=gm(pp,r,c,nb);
        for(var i=0;i<ms.length;i++){var tb=cb(nb);tb[ms[i][0]][ms[i][1]]=pp;tb[r][c]=null;if(!ich(tb,op)){ok=true;break;}}
      }
      if(!ok)return false;
    }
  }
  return!ich(nb,tn);
}

/* 状態 */
var B,T,sel,mvs,H,prm,over,chk;
var timerSente, timerGote, timerInterval;
var snapshots=[]; // 盤面スナップショット履歴
var reviewMode=false, reviewIdx=0;

function takeSnapshot(){
  snapshots.push({
    board: B.map(function(r){return r.slice();}),
    hands: {sente:H.sente.slice(), gote:H.gote.slice()},
    turn: T
  });
}

function init(){
  B=INIT.map(function(r){return r.slice();});
  T="sente";sel=null;mvs=[];H={sente:[],gote:[]};prm=null;over=null;chk=false;
  timerSente=TIMER_TOTAL;
  timerGote=TIMER_TOTAL;
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=null;
  stopBGM();
  snapshots=[];
  takeSnapshot(); // 初期局面を保存
  reviewMode=false;
  reviewIdx=0;
  var ba=document.querySelector(".board-area");
  if(ba) ba.classList.remove("review-mode");
  var rb=document.getElementById("review-bar");
  if(rb) rb.classList.remove("show");

}

/* タイマー */
function formatTime(sec){
  var m=Math.floor(sec/60);
  var s=sec%60;
  return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  if(over) return;
  startBGM();
  timerInterval=setInterval(function(){
    if(over||prm) return;
    if(T==="sente"){
      timerSente--;
      if(timerSente<=0){
        timerSente=0;
        var gn=document.getElementById("gi").textContent.replace("☖ ","");
        over=gn+" の勝ち";
        clearInterval(timerInterval);
        timerInterval=null;
        renderTimers();renderBanners();

        showWinDialog("gote");
        return;
      }
    } else {
      timerGote--;
      if(timerGote<=0){
        timerGote=0;
        var sn=document.getElementById("si").textContent.replace("☗ ","");
        over=sn+" の勝ち";
        clearInterval(timerInterval);
        timerInterval=null;
        renderTimers();renderBanners();

        showWinDialog("sente");
        return;
      }
    }
    renderTimers();
    if(over) renderBanners();
  }, 1000);
}

function renderTimers(){
  var $st=document.getElementById("sente-time");
  var $gt=document.getElementById("gote-time");
  var $sb=document.getElementById("sente-timer");
  var $gb=document.getElementById("gote-timer");

  $st.textContent=formatTime(timerSente);
  $gt.textContent=formatTime(timerGote);

  // active
  $sb.classList.toggle("active", T==="sente" && !over);
  $gb.classList.toggle("active", T==="gote" && !over);

  // danger (残り3分以下)
  $sb.classList.toggle("danger", timerSente<=180);
  $gb.classList.toggle("danger", timerGote<=180);
}

/* DOM */
var $tb=document.getElementById("tb");
var $sh=document.getElementById("sh");
var $gh=document.getElementById("gh");
var $si=document.getElementById("si");
var $gi=document.getElementById("gi");
var $ov=document.getElementById("ov");

function render(){
  drawBoard();
  dh($sh,H.sente,"sente");
  dh($gh,H.gote,"gote");
  if(T==="sente"){$si.classList.add("on");$gi.classList.remove("on");}
  else{$gi.classList.add("on");$si.classList.remove("on");}
  renderTimers();
  renderBanners();
  syncRowWidth();
}

function syncRowWidth(){
  requestAnimationFrame(function(){
    var tbl=document.getElementById("tbl");
    if(!tbl) return;
    var w=tbl.offsetWidth;
    if(w>0){
      document.querySelector(".gote-row").style.width=w+"px";
      document.querySelector(".sente-row").style.width=w+"px";
    }
  });
}

function renderBanners(){
  if(prm){
    $ov.classList.add("show");
    $ov.classList.toggle("gote-turn", T==="gote");
  }else{
    $ov.classList.remove("show");
    $ov.classList.remove("gote-turn");
  }
}

function drawBoard(){
  var html="";
  for(var r=0;r<9;r++){
    html+="<tr>";
    for(var c=0;c<9;c++){
      var pc=B[r][c];
      var cls="";
      if(sel&&sel.t==="b"&&sel.r===r&&sel.c===c) cls+=" sel";
      var isTgt=false;
      for(var m=0;m<mvs.length;m++){if(mvs[m][0]===r&&mvs[m][1]===c){isTgt=true;break;}}
      if(isTgt){cls+=pc?" cap":" mv";}
      html+='<td class="'+cls.trim()+'" data-r="'+r+'" data-c="'+c+'">';
      if(pc) html+=komaHTML(pc, isG(pc));
      html+='</td>';
    }
    html+="</tr>";
  }
  $tb.innerHTML=html;
  var tds=$tb.querySelectorAll("td");
  for(var i=0;i<tds.length;i++) tds[i].addEventListener("click",onCellClick);
}

function dh(el,arr,pl){
  if(arr.length===0){
    el.innerHTML='<span class="hand-empty">持ち駒なし</span>';
    return;
  }
  var co={};for(var i=0;i<arr.length;i++){co[arr[i]]=(co[arr[i]]||0)+1;}
  var ks=Object.keys(co);
  var h="";
  for(var k=0;k<ks.length;k++){
    var pc=ks[k],cnt=co[pc];
    var cls="hand-koma";
    if(pl==="gote") cls+=" gote-hk";
    if(sel&&sel.t==="h"&&sel.p===pc&&T===pl) cls+=" sel";
    h+='<div class="'+cls+'" data-hp="'+pc+'" data-pl="'+pl+'">';
    h+='<div class="koma-bg"></div>';
    h+='<span class="koma-text">'+dn(pc)+'</span>';
    if(cnt>1) h+='<span class="hand-count">'+cnt+'</span>';
    h+='</div>';
  }
  el.innerHTML=h;
  var divs=el.querySelectorAll(".hand-koma");
  for(var i=0;i<divs.length;i++) divs[i].addEventListener("click",onHandClick);
}

/* イベント */
function onCellClick(e){
  if(reviewMode||over||prm)return;
  var td=e.currentTarget;
  var r=parseInt(td.getAttribute("data-r"));
  var c=parseInt(td.getAttribute("data-c"));
  var pc=B[r][c];

  if(sel){
    var hit=false;
    for(var i=0;i<mvs.length;i++){if(mvs[i][0]===r&&mvs[i][1]===c){hit=true;break;}}
    if(hit){
      if(sel.t==="h"){doDrop(sel.p,r,c);return;}
      var mp=B[sel.r][sel.c];
      if(cpr(mp,sel.r,r)){
        if(mpr(mp,r)){doMv(sel.r,sel.c,r,c,true);}
        else{prm={fr:sel.r,fc:sel.c,tr:r,tc:c};render();}
        return;
      }
      doMv(sel.r,sel.c,r,c,false);
      return;
    }
    // 合法手でないマスをタップした場合
    if(sel.t==="h" && !pc){
      // 持ち駒を選択中で空きマスだが合法手でない
      var bpc = sel.p.toUpperCase();
      if(bpc==="P"){
        // 二歩チェック
        var hasPawn=false;
        for(var rr=0;rr<9;rr++){var pp=B[rr][c];if(pp&&(pp==="P"||pp==="p")&&((T==="sente"&&isS(pp))||(T==="gote"&&isG(pp)))){hasPawn=true;break;}}
        if(hasPawn){showWarning("二歩です！\nこの筋には歩を打てません");sel=null;mvs=[];render();return;}
      }
      showWarning("ここには打てません");
      sel=null;mvs=[];render();return;
    }
    if(sel.t==="b" && !(pc&&((T==="sente"&&isS(pc))||(T==="gote"&&isG(pc))))){
      // 盤上の駒を選択中で合法手でないマスをタップ
      showWarning("そこには動けません");
      sel=null;mvs=[];render();return;
    }
  }

  // 相手の駒をタップした場合
  if(pc&&((T==="sente"&&isG(pc))||(T==="gote"&&isS(pc)))){
    showWarning("相手の駒です");
    sel=null;mvs=[];render();return;
  }

  if(pc&&((T==="sente"&&isS(pc))||(T==="gote"&&isG(pc)))){
    var raw=gm(pc,r,c,B);
    var leg=[];
    for(var i=0;i<raw.length;i++){
      var mr=raw[i][0],mc=raw[i][1];
      if(lm(B,r,c,mr,mc,pc,T,false)||(cpr(pc,r,mr)&&lm(B,r,c,mr,mc,pc,T,true))) leg.push(raw[i]);
    }
    if(leg.length===0){
      showWarning("この駒は動かせません");
      sel=null;mvs=[];render();return;
    }
    sel={t:"b",r:r,c:c};mvs=leg;render();
    if(!timerInterval) startTimer();
    return;
  }

  sel=null;mvs=[];render();
}

function onHandClick(e){
  if(reviewMode||over||prm)return;
  var div=e.currentTarget;
  var pc=div.getAttribute("data-hp");
  var pl=div.getAttribute("data-pl");
  if(T!==pl){
    showWarning("相手の持ち駒です");
    return;
  }
  var raw=gd(pc,B,T);
  var leg=[];
  for(var i=0;i<raw.length;i++){
    if(ld(B,pc,raw[i][0],raw[i][1],T)) leg.push(raw[i]);
  }
  if(leg.length===0){
    var bpc=pc.toUpperCase();
    if(bpc==="P") showWarning("この歩は打てません\n（二歩の可能性）");
    else showWarning("この駒は打てる場所がありません");
    sel=null;mvs=[];render();return;
  }
  sel={t:"h",p:pc};mvs=leg;render();
}

function doMv(fr,fc,tr,tc,pr){
  var pc=B[fr][fc];var cp=B[tr][tc];
  if(cp){var c=cap(cp);if(c)H[T].push(c);}
  B[tr][tc]=pr?PRO[pc]:pc;B[fr][fc]=null;
  endT();
}
function doDrop(pc,tr,tc){
  B[tr][tc]=pc;
  var idx=H[T].indexOf(pc);if(idx>=0)H[T].splice(idx,1);
  endT();
}

function endT(){
  sel=null;mvs=[];prm=null;
  playKomaSound();
  var nx=T==="sente"?"gote":"sente";T=nx;
  takeSnapshot(); // 局面を保存
  chk=ich(B,nx);
  if(chk) playOuteSound();
  chkEnd(nx);
  render();
  if(!over && !timerInterval) startTimer();
}

function chkEnd(tn){
  var found=false;
  for(var r=0;r<9&&!found;r++)for(var c=0;c<9&&!found;c++){
    var p=B[r][c];if(!p)continue;
    if(tn==="sente"&&!isS(p))continue;if(tn==="gote"&&!isG(p))continue;
    var ms=gm(p,r,c,B);
    for(var i=0;i<ms.length;i++){
      if(lm(B,r,c,ms[i][0],ms[i][1],p,tn,false)||(cpr(p,r,ms[i][0])&&lm(B,r,c,ms[i][0],ms[i][1],p,tn,true))){found=true;break;}
    }
  }
  if(!found){
    var uq=[];var hd=H[tn];for(var i=0;i<hd.length;i++){if(uq.indexOf(hd[i])<0)uq.push(hd[i]);}
    for(var k=0;k<uq.length&&!found;k++){
      var ds=gd(uq[k],B,tn);
      for(var d=0;d<ds.length&&!found;d++){if(ld(B,uq[k],ds[d][0],ds[d][1],tn))found=true;}
    }
  }
  if(!found){
    var winner = tn==="sente" ? "gote" : "sente";
    var winnerName = winner==="sente" ? document.getElementById("si").textContent.replace("☗ ","") : document.getElementById("gi").textContent.replace("☖ ","");
    over = chk ? winnerName + " の勝ち" : "引き分け";
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}

    if(chk) setTimeout(function(){ showWinDialog(winner); }, 300);
  }
}

/* ダイアログ */
document.getElementById("py").addEventListener("click",function(){if(!prm)return;doMv(prm.fr,prm.fc,prm.tr,prm.tc,true);});
document.getElementById("pn").addEventListener("click",function(){if(!prm)return;doMv(prm.fr,prm.fc,prm.tr,prm.tc,false);});

/* 勝ちダイアログ */
var $winOv=document.getElementById("win-ov");
var $winText=document.getElementById("win-text");

function showWinDialog(winner){
  stopBGM();
  $winText.textContent="あなたの勝ちです";
  if(winner==="gote"){
    $winOv.classList.add("gote-win");
  } else {
    $winOv.classList.remove("gote-win");
  }
  $winOv.classList.add("show");
  playWinSound();
}
function hideWinDialog(){
  $winOv.classList.remove("show");
  $winOv.classList.remove("gote-win");
}
document.getElementById("win-ok").addEventListener("click",function(){
  hideWinDialog();
  enterReviewMode();
});

/* ===== 検討モード ===== */
function enterReviewMode(){
  reviewMode=true;
  reviewIdx=snapshots.length-1;
  document.querySelector(".board-area").classList.add("review-mode");
  document.getElementById("review-bar").classList.add("show");
  showReviewAt(reviewIdx);
}

function showReviewAt(idx){
  if(idx<0) idx=0;
  if(idx>=snapshots.length) idx=snapshots.length-1;
  reviewIdx=idx;
  var snap=snapshots[idx];
  // 盤面を描画（読み取り専用）
  var $tbody=document.getElementById("tb");
  var html="";
  for(var r=0;r<9;r++){
    html+="<tr>";
    for(var c=0;c<9;c++){
      var pc=snap.board[r][c];
      html+='<td>';
      if(pc) html+=komaHTML(pc, isG(pc));
      html+='</td>';
    }
    html+="</tr>";
  }
  $tbody.innerHTML=html;
  // 持ち駒を描画
  drawReviewHand(document.getElementById("sh"), snap.hands.sente, "sente");
  drawReviewHand(document.getElementById("gh"), snap.hands.gote, "gote");
  // 手番表示
  var $si=document.getElementById("si");
  var $gi=document.getElementById("gi");
  if(snap.turn==="sente"){$si.classList.add("on");$gi.classList.remove("on");}
  else{$gi.classList.add("on");$si.classList.remove("on");}
  // 情報
  document.getElementById("rev-info").textContent=idx+"手目 / "+(snapshots.length-1)+"手";
  // ボタン状態
  document.getElementById("rev-first").disabled=(idx===0);
  document.getElementById("rev-prev").disabled=(idx===0);
  document.getElementById("rev-next").disabled=(idx>=snapshots.length-1);
  document.getElementById("rev-last").disabled=(idx>=snapshots.length-1);
  syncRowWidth();
}

function drawReviewHand(el,arr,pl){
  if(arr.length===0){
    el.innerHTML='<span class="hand-empty">持ち駒なし</span>';
    return;
  }
  var co={};for(var i=0;i<arr.length;i++){co[arr[i]]=(co[arr[i]]||0)+1;}
  var ks=Object.keys(co);
  var h="";
  for(var k=0;k<ks.length;k++){
    var pc=ks[k],cnt=co[pc];
    var cls="hand-koma";
    if(pl==="gote") cls+=" gote-hk";
    h+='<div class="'+cls+'">';
    h+='<div class="koma-bg"></div>';
    h+='<span class="koma-text">'+dn(pc)+'</span>';
    if(cnt>1) h+='<span class="hand-count">'+cnt+'</span>';
    h+='</div>';
  }
  el.innerHTML=h;
}

document.getElementById("rev-first").addEventListener("click",function(){ showReviewAt(0); });
document.getElementById("rev-prev").addEventListener("click",function(){ showReviewAt(reviewIdx-1); });
document.getElementById("rev-next").addEventListener("click",function(){ showReviewAt(reviewIdx+1); });
document.getElementById("rev-last").addEventListener("click",function(){ showReviewAt(snapshots.length-1); });

/* 投了 */
/* 投了動画 */
var $vidOv = document.getElementById("video-ov");
var $vid = document.getElementById("touryou-video");

function playResignVideo(winner){
  $vidOv.classList.add("show");
  $vid.currentTime = 0;
  $vid.play().catch(function(){
    // 再生できなかった場合はスキップ
    $vidOv.classList.remove("show");
    showWinDialog(winner);
  });
  $vid.onended = function(){
    $vidOv.classList.remove("show");
    showWinDialog(winner);
  };
  $vid.onerror = function(){
    $vidOv.classList.remove("show");
    showWinDialog(winner);
  };
}

function handleResign(who){
  if(over) return;
  var winner = who==="sente" ? "gote" : "sente";
  var winnerName = winner==="sente" ? document.getElementById("si").textContent.replace("☗ ","") : document.getElementById("gi").textContent.replace("☖ ","");
  over = winnerName + " の勝ち";
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  stopBGM();
  render();
  // ユーザータップの直接コールバック内で動画再生
  playResignVideo(winner);
}

// 投了ボタン — クリックイベント内で直接実行（iPad対策）
document.getElementById("resign-sente").addEventListener("click",function(){ handleResign("sente"); });
document.getElementById("resign-gote").addEventListener("click",function(){ handleResign("gote"); });

/* 起動 */
init();
/* ゲーム画面は非表示のまま。タイトル画面が最初に表示される */

/* ===== タイトル画面・振り駒 ===== */
var furiResult = null; // {sente:"name", gote:"name"}
var furiDone = false;

document.getElementById("furi-btn").addEventListener("click", function(){
  var btn = this;
  btn.disabled = true;
  furiDone = false;
  document.getElementById("furi-result").textContent = "";
  document.getElementById("start-btn").classList.remove("show");

  // 5枚の駒を振る
  var pieces = document.querySelectorAll(".furi-koma");
  // シェイクアニメーション開始
  for(var i=0; i<pieces.length; i++){
    pieces[i].classList.remove("landed","tokin");
    pieces[i].querySelector(".koma-text").textContent = "歩";
    pieces[i].classList.add("shaking");
  }

  // 1秒後に結果決定
  setTimeout(function(){
    var tokinCount = 0;
    var results = [];
    for(var i=0; i<5; i++){
      // 各駒50%の確率で歩/と金
      var isTokin = Math.random() < 0.5;
      results.push(isTokin);
      if(isTokin) tokinCount++;
    }

    // 順次着地アニメーション
    for(var i=0; i<5; i++){
      (function(idx, isTokin){
        setTimeout(function(){
          var koma = pieces[idx];
          koma.classList.remove("shaking");
          koma.classList.add("landed");
          if(isTokin){
            koma.classList.add("tokin");
            koma.querySelector(".koma-text").textContent = "と";
          }

          // 最後の駒が着地したら結果表示
          if(idx === 4){
            setTimeout(function(){
              var name1 = document.getElementById("name1").value.trim() || "プレイヤー1";
              var name2 = document.getElementById("name2").value.trim() || "プレイヤー2";
              var resultEl = document.getElementById("furi-result");

              // 公式ルール準拠：と金が多い(3枚以上)→振った側(プレイヤー1)が先手
              // 歩が多い(3枚以上)→プレイヤー2が先手
              // 5枚とも同じ → 振り直し（ここでは自動で振り直し扱いにせず結果表示）
              if(tokinCount >= 3){
                furiResult = {sente: name1, gote: name2};
                resultEl.textContent = "と金" + tokinCount + "枚 → " + name1 + " が先手！";
              } else {
                furiResult = {sente: name2, gote: name1};
                resultEl.textContent = "歩" + (5 - tokinCount) + "枚 → " + name2 + " が先手！";
              }
              furiDone = true;
              document.getElementById("start-btn").classList.add("show");
              btn.disabled = false;
            }, 200);
          }
        }, idx * 150);
      })(i, results[i]);
    }
  }, 1000);
});

document.getElementById("start-btn").addEventListener("click", function(){
  if(!furiResult) return;
  // ゲーム画面に名前を反映
  document.getElementById("si").textContent = "☗ " + furiResult.sente;
  document.getElementById("gi").textContent = "☖ " + furiResult.gote;
  // 画面切り替え
  document.getElementById("title-screen").style.display = "none";
  document.getElementById("game-screen").classList.add("show");
  init();
  render();
  // ユーザータップの中でBGMを直接再生（iPad対策）
  bgm.play().then(function(){ bgmStarted = true; }).catch(function(){});
  // 動画もアンロック（iPad Safari対策: 一度play→pauseでロック解除）
  var v = document.getElementById("touryou-video");
  v.play().then(function(){ v.pause(); v.currentTime = 0; }).catch(function(){});
});

/* 検討モードの「新規対局」→タイトル画面に戻る */
document.getElementById("rev-exit").addEventListener("click", function(){
  reviewMode = false;
  document.querySelector(".board-area").classList.remove("review-mode");
  document.getElementById("review-bar").classList.remove("show");
  document.getElementById("game-screen").classList.remove("show");
  document.getElementById("title-screen").style.display = "flex";
  // 振り駒リセット
  furiDone = false;
  furiResult = null;
  document.getElementById("furi-result").textContent = "";
  document.getElementById("start-btn").classList.remove("show");
  var pieces = document.querySelectorAll(".furi-koma");
  for(var i=0; i<pieces.length; i++){
    pieces[i].classList.remove("landed","tokin","shaking");
    pieces[i].querySelector(".koma-text").textContent = "歩";
  }
});

window.addEventListener("resize", syncRowWidth);

})();
