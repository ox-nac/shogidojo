<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>将棋 - Shogi Game</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: #1e1810;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  padding: 20px 12px;
  color: #e8d5b0;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

/* レイアウト */
.board-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* プレイヤー行 */
.player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 50px;
  max-width: 100%;
}
.player-row.gote-row {
  flex-direction: row-reverse;
}

.turn-label {
  font-size: 12px;
  font-weight: bold;
  padding: 3px 10px;
  border-radius: 4px;
  background: rgba(80,50,25,0.5);
  border: 1px solid rgba(139,115,85,0.4);
  opacity: 0.35;
  white-space: nowrap;
}
.turn-label.on { opacity: 1; border-color: #8B7355; }
.gote-row .turn-label { transform: rotate(180deg); }

.turn-role {
  font-size: 11px;
  opacity: 0.75;
  letter-spacing: 1px;
}
.turn-name {
  font-size: 13px;
  letter-spacing: 1px;
  margin-top: 1px;
}

/* 持ち駒エリア */
.hand-area {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
  min-height: 56px;
  flex: 1;
}
.gote-row .hand-area { flex-direction: row-reverse; }
.hand-empty { font-size: 13px; opacity: 0.4; }
.gote-row .hand-empty { transform: rotate(180deg); }
.gote-row .resign-btn { transform: rotate(180deg); }

/* ===== タイマー ===== */
.timer-box {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  background: rgba(0,0,0,0.35);
  border: 1.5px solid #5a4030;
  border-radius: 5px;
  min-width: 85px;
  justify-content: center;
  flex-shrink: 0;
}
.timer-box.active {
  border-color: #c49a4a;
  background: rgba(80,50,20,0.5);
}
.timer-box.danger {
  border-color: #c0392b;
  background: rgba(120,30,20,0.3);
}
.timer-icon {
  font-size: 13px;
  opacity: 0.7;
}
.timer-time {
  font-size: 18px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
  color: #e8d5b0;
  font-family: "Courier New", "Consolas", monospace;
}
.timer-box.danger .timer-time {
  color: #e74c3c;
}
.gote-row .timer-box {
  transform: rotate(180deg);
}

/* ===== 五角形駒（参考画像準拠） ===== */
.koma {
  position: absolute;
  top: 46%;
  left: 50%;
  width: 42px;
  height: 48px;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.45));
}

/* 外側の五角形（枠線の役割）
   頂点(上中央) → 左肩(上の角) → 左下 → 右下 → 右肩
   肩は底辺より内側（狭い）= 上に向かってスリムに */
.koma-bg {
  position: absolute;
  inset: 0;
  clip-path: polygon(50% 8%, 10% 30%, 0% 100%, 100% 100%, 90% 30%);
  background: linear-gradient(175deg, #8a6d3a 0%, #6b5028 100%);
}

/* 内側の五角形（木目グラデーション） */
.koma-bg::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 1px;
  clip-path: polygon(50% 9%, 12% 31%, 2% 100%, 98% 100%, 88% 31%);
  background:
    linear-gradient(175deg,
      #f0d48a 0%,
      #e6c36e 15%,
      #d4a84e 35%,
      #c89840 55%,
      #ba8735 75%,
      #a67328 100%
    );
  box-shadow: inset 0 -4px 8px rgba(120,80,20,0.2),
              inset 0 2px 4px rgba(255,240,180,0.3);
}

/* 駒の文字 */
.koma-text {
  position: relative;
  z-index: 2;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  font-size: 24px;
  font-weight: 900;
  color: #1a1408;
  line-height: 1;
  margin-top: 8px;
  text-shadow: 0 0.5px 0 rgba(180,150,80,0.3);
  /* 筆文字風のレタリング */
  -webkit-text-stroke: 0.3px #2a1a08;
}

.koma.promoted .koma-text {
  color: #8b1a1a;
  -webkit-text-stroke: 0.3px #5a0a0a;
}
.koma.gote { top: 54%; transform: translate(-50%, -50%) rotate(180deg); }

/* ===== 持ち駒 ===== */
.hand-koma {
  position: relative;
  width: 42px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.4));
}
.hand-koma:hover { transform: scale(1.08); }
.hand-koma.gote-hk { transform: rotate(180deg); }
.hand-koma.gote-hk:hover { transform: rotate(180deg) scale(1.08); }

/* 選択時は少し明るく */
.hand-koma.sel .koma-bg::after {
  background:
    linear-gradient(175deg,
      #f8e0a0 0%,
      #f0d080 15%,
      #e0b860 35%,
      #d4a850 55%,
      #c89840 75%,
      #b88830 100%
    );
}

.hand-count {
  position: absolute;
  bottom: -2px; right: -4px;
  font-size: 11px; font-weight: bold; color: #fff;
  background: #5a3818; border-radius: 50%;
  width: 17px; height: 17px;
  display: flex; align-items: center; justify-content: center;
  z-index: 5; pointer-events: none;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
.hand-koma.gote-hk .hand-count {
  transform: rotate(180deg);
  bottom: auto; top: -2px;
}

/* 盤 */
.board-frame {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
}
.col-labels { display: flex; margin-bottom: 1px; }
.col-labels span {
  width: 52px; text-align: center;
  font-size: 13px; font-weight: bold; color: #a08050;
}
.board-body { display: flex; align-items: stretch; position: relative; }
.row-labels { display: flex; flex-direction: column; margin-left: 3px; }
.row-labels span {
  height: 52px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #a08050; width: 20px;
}

table.board {
  border-collapse: collapse;
  border: 3px solid #6b4423;
  background-color: #DEB887;
}
table.board td {
  width: 52px; height: 52px;
  border: 1px solid #a08050;
  text-align: center; vertical-align: middle;
  cursor: pointer; position: relative;
  padding: 0;
  background-color: #DEB887;
}
table.board td:hover { background-color: #d4a867; }
table.board td.sel { background-color: #c49a4a !important; }
table.board td.mv::after {
  content: ""; position: absolute;
  top: 50%; left: 50%;
  width: 16px; height: 16px; margin: -8px 0 0 -8px;
  border-radius: 50%; background: rgba(56,130,50,0.55);
  pointer-events: none; z-index: 3;
}
table.board td.cap { background-color: rgba(200,80,60,0.15) !important; }
table.board td.cap::after {
  content: ""; position: absolute;
  top: 50%; left: 50%;
  width: 16px; height: 16px; margin: -8px 0 0 -8px;
  border-radius: 50%; background: rgba(200,60,40,0.5);
  pointer-events: none; z-index: 3;
}

/* ボタン */
.reset-btn {
  padding: 9px 26px;
  background: linear-gradient(135deg, #6b4423, #8B5E3C);
  color: #e8d5b0; border: 2px solid #8B7355;
  border-radius: 7px; font-size: 15px; font-weight: bold;
  cursor: pointer;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  margin-top: 6px;
}
.reset-btn:hover { background: linear-gradient(135deg, #8B5E3C, #a06e48); }

/* 投了ボタン */
.resign-btn {
  padding: 4px 12px;
  background: linear-gradient(135deg, #5a1a1a, #7a2a2a);
  color: #e8d5b0;
  border: 1.5px solid #8B4040;
  border-radius: 5px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  flex-shrink: 0;
}
.resign-btn:hover { background: linear-gradient(135deg, #7a2a2a, #943535); }

/* ボタン行 */
.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}

/* 勝ちダイアログ */
.win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.win-overlay.show { display: flex; }
.win-dialog {
  background: linear-gradient(135deg, #3d2e1f, #2a1f14);
  border: 2px solid #c49a4a;
  border-radius: 12px;
  padding: 30px 44px;
  text-align: center;
  box-shadow: 0 16px 50px rgba(0,0,0,0.5);
  transition: transform 0.15s;
}
.win-overlay.gote-win .win-dialog {
  transform: rotate(180deg);
}
.win-text {
  font-size: 26px;
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 20px;
  text-shadow: 0 0 15px rgba(255,215,0,0.3);
}
.win-ok-btn {
  padding: 10px 36px;
  font-size: 18px;
  font-weight: bold;
  font-family: "Yu Mincho", serif;
  background: linear-gradient(135deg, #6b4423, #8B5E3C);
  color: #e8d5b0;
  border: 2px solid #8B7355;
  border-radius: 7px;
  cursor: pointer;
}
.win-ok-btn:hover { background: linear-gradient(135deg, #8B5E3C, #a06e48); }

/* 成りダイアログ */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center; align-items: center; z-index: 999;
}
.overlay.show { display: flex; }
.dialog {
  background: linear-gradient(135deg, #3d2e1f, #2a1f14);
  border: 2px solid #8B7355; border-radius: 10px;
  padding: 24px 36px; text-align: center;
  box-shadow: 0 16px 50px rgba(0,0,0,0.5);
  transition: transform 0.15s;
}
.overlay.gote-turn .dialog {
  transform: rotate(180deg);
}
.dialog p { font-size: 19px; font-weight: bold; margin-bottom: 18px; color: #e8d5b0; }
.dialog button {
  padding: 10px 30px; margin: 0 8px;
  font-size: 17px; font-weight: bold;
  font-family: "Yu Mincho", serif;
  border: 2px solid #8B7355; border-radius: 7px; cursor: pointer;
}
.btn-y { background: #b22222; color: #fff; }
.btn-y:hover { background: #d42a2a; }
.btn-n { background: #4a3828; color: #e8d5b0; }
.btn-n:hover { background: #5a4838; }

/* 時間切れダイアログ */
.time-up-banner {
  display: none;
  font-size: 26px;
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 10px;
}

/* 警告トースト */

/* ===== 検討モード ===== */
.review-bar {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.review-bar.show { display: flex; }

.review-btn {
  padding: 6px 18px;
  background: linear-gradient(135deg, #4a3520, #6b4423);
  color: #e8d5b0;
  border: 1.5px solid #8B7355;
  border-radius: 5px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  min-width: 44px;
  text-align: center;
}
.review-btn:hover { background: linear-gradient(135deg, #6b4423, #8B5E3C); }
.review-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.review-info {
  font-size: 14px;
  color: #c4a875;
  min-width: 80px;
  text-align: center;
}

.review-exit-btn {
  padding: 5px 16px;
  background: linear-gradient(135deg, #5a1a1a, #7a2a2a);
  color: #e8d5b0;
  border: 1.5px solid #8B4040;
  border-radius: 5px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  font-family: "Yu Mincho", "Hiragino Mincho Pro", "MS Mincho", serif;
  margin-left: 8px;
}
.review-exit-btn:hover { background: linear-gradient(135deg, #7a2a2a, #943535); }

/* 後手側検討バー（逆さま） */
.review-bar-gote {
  transform: rotate(180deg);
}

.review-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 4;
  cursor: default;
}
.board-area { position: relative; }
/* 検討モード中は投了ボタン非表示 */
.review-mode .resign-btn { display: none; }
.review-mode .timer-box { opacity: 0.3; }

/* 投了動画カットイン */
.video-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  justify-content: center;
  align-items: center;
  z-index: 1100;
  transition: background 0.3s;
}
.video-overlay.show {
  display: flex;
  background: rgba(0,0,0,0.85);
}
.video-overlay video {
  max-width: 80vw;
  max-height: 65vh;
  border-radius: 6px;
  box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 20px rgba(200,160,50,0.15);
  border: 2px solid rgba(200,160,50,0.25);
  transform: translateX(-110vw);
}

/* カットイン: 左からスライドイン */
.video-overlay.cutin video {
  animation: cutinSlide 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes cutinSlide {
  0% { transform: translateX(-110vw) scale(0.8); }
  70% { transform: translateX(3vw) scale(1.02); }
  100% { transform: translateX(0) scale(1); }
}

/* カットアウト: 右へスライドアウト */
.video-overlay.cutout video {
  animation: cutoutSlide 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
}
@keyframes cutoutSlide {
  0% { transform: translateX(0) scale(1); }
  30% { transform: translateX(-3vw) scale(1.02); }
  100% { transform: translateX(110vw) scale(0.8); }
}

/* 後手勝ち: 回転 */
.video-overlay.gote-winner.cutin video {
  animation: cutinSlideGote 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes cutinSlideGote {
  0% { transform: translateX(-110vw) scale(0.8) rotate(180deg); }
  70% { transform: translateX(3vw) scale(1.02) rotate(180deg); }
  100% { transform: translateX(0) scale(1) rotate(180deg); }
}
.video-overlay.gote-winner.cutout video {
  animation: cutoutSlideGote 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
}
@keyframes cutoutSlideGote {
  0% { transform: translateX(0) scale(1) rotate(180deg); }
  30% { transform: translateX(-3vw) scale(1.02) rotate(180deg); }
  100% { transform: translateX(110vw) scale(0.8) rotate(180deg); }
}

/* 終盤デュアル動画オーバーレイ */
.video-overlay-dual .dual-video-wrap {
  display: flex;
  flex-direction: column;
  gap: 0;
  align-items: center;
  width: 100vw;
  height: 100vh;
}
.dual-video-top, .dual-video-bottom {
  width: 100vw;
  height: 50vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dual-video-top video, .dual-video-bottom video {
  width: 100%;
  min-height: 100%;
  object-fit: cover;
  display: block;
}
/* 奥側（上）は180度回転 */
.dual-video-top {
  transform: rotate(180deg);
}

/* カットイン（手前=左から、奥=右から＝回転しているので逆） */
.video-overlay-dual.cutin .dual-video-bottom {
  animation: cutinSlide 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.video-overlay-dual.cutin .dual-video-top {
  animation: cutinFromRight 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes cutinFromRight {
  0% { transform: translateX(110vw) scale(0.8) rotate(180deg); }
  70% { transform: translateX(-3vw) scale(1.02) rotate(180deg); }
  100% { transform: translateX(0) scale(1) rotate(180deg); }
}

/* カットアウト（手前=右へ、奥=左へ＝回転しているので逆） */
.video-overlay-dual.cutout .dual-video-bottom {
  animation: cutoutSlide 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
}
.video-overlay-dual.cutout .dual-video-top {
  animation: cutoutToLeft 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
}
@keyframes cutoutToLeft {
  0% { transform: translateX(0) scale(1) rotate(180deg); }
  30% { transform: translateX(3vw) scale(1.02) rotate(180deg); }
  100% { transform: translateX(-110vw) scale(0.8) rotate(180deg); }
}

.warning-toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: rgba(40, 25, 15, 0.95);
  border: 2px solid #c0392b;
  border-radius: 10px;
  padding: 20px 32px;
  text-align: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.warning-toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: auto;
}
.warning-toast.gote-warn {
  transform: translate(-50%, -50%) scale(1) rotate(180deg);
}
.warning-text {
  font-size: 17px;
  font-weight: bold;
  color: #f0c0a0;
  line-height: 1.5;
}
.warning-icon {
  font-size: 28px;
  margin-bottom: 6px;
}

/* iPad・タブレット（デフォルトを大きめに） */

/* タイトル画面 */
.title-screen { gap: 44px; }
.title-logo { font-size: 120px; letter-spacing: 28px; }
.title-sub { font-size: 28px; letter-spacing: 7px; margin-top: -16px; }
.name-inputs { max-width: 640px; gap: 24px; }
.name-label { font-size: 26px; min-width: 140px; }
.name-input { font-size: 28px; padding: 16px 20px; }
.furigoma-area { min-width: 640px; padding: 36px; gap: 28px; }
.furigoma-title { font-size: 34px; letter-spacing: 7px; }
.furigoma-pieces { gap: 18px; }
.furi-koma { width: 90px; height: 100px; }
.furi-koma .koma-text { font-size: 46px; margin-top: 28px; }
.furigoma-result { font-size: 30px; }
.furi-btn { font-size: 34px; padding: 18px 64px; }
.furi-desc { font-size: 22px !important; max-width: 580px !important; }
.name-heading { font-size: 24px !important; letter-spacing: 5px !important; }

/* 盤面 */
table.board td { width: 80px; height: 80px; }
.koma { width: 64px; height: 72px; }
.koma-text { font-size: 36px; margin-top: 13px; }
.hand-koma { width: 58px; height: 66px; }
.hand-koma .koma-text { font-size: 32px; margin-top: 11px; }
.col-labels span { width: 80px; font-size: 16px; }
.row-labels span { height: 80px; font-size: 16px; width: 24px; }
.turn-label { font-size: 13px; padding: 3px 12px; }
.timer-time { font-size: 20px; }
.timer-icon { font-size: 14px; }
.timer-box { padding: 4px 12px; min-width: 95px; }
.hand-count { width: 22px; height: 22px; font-size: 14px; }
.hand-empty { font-size: 16px; }
.reset-btn { font-size: 16px; padding: 10px 28px; }
.resign-btn { font-size: 13px; padding: 5px 14px; }
.warning-text { font-size: 20px; }
.warning-icon { font-size: 34px; }
.dialog p { font-size: 24px; }
.dialog button { font-size: 22px; padding: 14px 38px; }
table.board { border: 4px solid #6b4423; }
body { padding: 8px 4px; }

/* PC・大画面 */
@media (min-width: 1100px) {
  table.board td { width: 64px; height: 64px; }
  .koma { width: 52px; height: 58px; }
  .koma-text { font-size: 28px; margin-top: 10px; }
  .hand-koma { width: 48px; height: 54px; }
  .hand-koma .koma-text { font-size: 26px; margin-top: 9px; }
  .col-labels span { width: 64px; font-size: 15px; }
  .row-labels span { height: 64px; font-size: 15px; }
}

/* スマホ */
@media (max-width: 600px) {
  table.board td { width: 40px; height: 40px; }
  .koma { width: 32px; height: 36px; }

(function(){

];

var TIMER_TOTAL = 600; // デフォルト10分、タイトル画面で変更可能

/* ===== Web Audio API サウンドシステム ===== */
var audioCtx = null;
var audioBuffers = {};
var bgmSource = null;
var bgmStarted = false;
var soundsLoaded = false;
var pendingAfterUnlock = null;

// 音声ファイルURLリスト
var soundFiles = {
  koma: "shogikoma.mp3",
  oute: "oute.mp3",
  win: "shorisengen.mp3",
  bgm: "bgm.mp3",
  start: "start.mp3",
  cutin: "cutin.mp3",
  button: "button.mp3",
  endgame_bgm: "endgame_bgm.mp3",
  nokori5: "nokori5.mp3",
  nokori3: "nokori3.mp3",
  nokori1: "nokori1.mp3"
};

// 音声ファイルを読み込み＆デコード
function loadAllSounds(callback){
  var keys = Object.keys(soundFiles);
  var loaded = 0;
  var total = keys.length;
  keys.forEach(function(name){
    fetch(soundFiles[name])
      .then(function(res){ return res.arrayBuffer(); })
      .then(function(buf){ return audioCtx.decodeAudioData(buf); })
      .then(function(decoded){
        audioBuffers[name] = decoded;
        loaded++;
        if(loaded >= total){
          soundsLoaded = true;
          if(callback) callback();
        }
      })
      .catch(function(){
        loaded++;
        if(loaded >= total){
          soundsLoaded = true;
          if(callback) callback();
        }
      });
  });
}

// ユーザータップで AudioContext 作成＆resume＆音声読み込み
function unlockAudio(callback){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  var doAfter = function(){
    if(!soundsLoaded){
      loadAllSounds(callback);
    } else {
      if(callback) callback();
    }
  };
  if(audioCtx.state === "suspended"){
    audioCtx.resume().then(doAfter).catch(doAfter);
  } else {
    doAfter();
  }
}

// バッファから再生（vol: 音量 0.0〜任意、省略で1.0）
function playSound(name, vol){

    source.connect(gain);
    gain.connect(audioCtx.destination);
  } else {
    source.connect(audioCtx.destination);
  }
  source.start(0);
  return source;
}

// BGM（ループ再生）
var bgmGain = null;
function startBGM(){

  bgmSource = audioCtx.createBufferSource();
  bgmSource.buffer = audioBuffers.bgm;
  bgmSource.loop = true;

function startEndgameBGM(){
  if(!audioCtx || !audioBuffers.endgame_bgm || endgameBgmStarted) return;
  if(typeof bgmEnabled !== "undefined" && !bgmEnabled) return;
  endgameBgmSource = audioCtx.createBufferSource();
  endgameBgmSource.buffer = audioBuffers.endgame_bgm;
  endgameBgmSource.loop = true;
  endgameBgmGain = audioCtx.createGain();
  endgameBgmGain.gain.value = 0.25;
  endgameBgmSource.connect(endgameBgmGain);
  endgameBgmGain.connect(audioCtx.destination);
  endgameBgmSource.start(0);
  endgameBgmStarted = true;
}
function stopEndgameBGM(){
  if(endgameBgmSource){
    try{ endgameBgmSource.stop(); }catch(e){}
    endgameBgmSource = null;
    endgameBgmGain = null;
  }
  endgameBgmStarted = false;
}
function muteEndgameBGM(){
  if(endgameBgmGain) endgameBgmGain.gain.value = 0;
}
function unmuteEndgameBGM(){
  if(endgameBgmGain) endgameBgmGain.gain.value = 0.25;
}

function isS(p){return p!==null&&p===p.toUpperCase();}
function isG(p){return p!==null&&p!==p.toUpperCase();}
function isP(p){return p!==null&&p.length===2&&p[0].toLowerCase()==="p";}
function dn(p){return p?(PN[p]||p):"";}
function bp(p){return UNP[p]||p;}
function cap(p){if(!p)return null;var b=UNP[p]||p;return isS(p)?b.toLowerCase():b.toUpperCase();}
function cb(b){return b.map(function(r){return r.slice();});}

function komaHTML(piece, isGotePiece){
  var cls="koma";
  if(isGotePiece) cls+=" gote";
  if(isP(piece)) cls+=" promoted";
  return '<div class="'+cls+'"><div class="koma-bg"></div><span class="koma-text">'+dn(piece)+'</span></div>';
}

function gm(pc,row,col,bd){
  var mv=[],se=isS(pc),d=se?-1:1,b=bp(pc).toUpperCase(),pr=isP(pc);
  function a(r,c){if(r<0||r>8||c<0||c>8)return false;var t=bd[r][c];if(t&&((se&&isS(t))||(!se&&isG(t))))return false;mv.push([r,c]);return!t;}
  function ln(dr,dc){for(var i=1;i<=8;i++){if(!a(row+dr*i,col+dc*i))break;}}
  if(pr&&b!=="R"&&b!=="B"){a(row+d,col-1);a(row+d,col);a(row+d,col+1);a(row,col-1);a(row,col+1);a(row-d,col);return mv;}
  switch(b){
    case"K":for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++)if(dr||dc)a(row+dr,col+dc);break;
    case"R":ln(-1,0);ln(1,0);ln(0,-1);ln(0,1);if(pr){a(row-1,col-1);a(row-1,col+1);a(row+1,col-1);a(row+1,col+1);}break;
    case"B":ln(-1,-1);ln(-1,1);ln(1,-1);ln(1,1);if(pr){a(row-1,col);a(row+1,col);a(row,col-1);a(row,col+1);}break;
    case"G":a(row+d,col-1);a(row+d,col);a(row+d,col+1);a(row,col-1);a(row,col+1);a(row-d,col);break;
    case"S":a(row+d,col-1);a(row+d,col);a(row+d,col+1);a(row-d,col-1);a(row-d,col+1);break;
    case"N":a(row+d*2,col-1);a(row+d*2,col+1);break;
    case"L":ln(d,0);break;
    case"P":a(row+d,col);break;
  }
  return mv;
}
function gd(pc,bd,tn){
  var mv=[],b=pc.toUpperCase();
  for(var r=0;r<9;r++){for(var c=0;c<9;c++){
    if(bd[r][c])continue;
    if(b==="P"){var dup=false;for(var rr=0;rr<9;rr++){var pp=bd[rr][c];if(pp&&(pp==="P"||pp==="p")&&((tn==="sente"&&isS(pp))||(tn==="gote"&&isG(pp)))){dup=true;break;}}if(dup)continue;}
    if((b==="P"||b==="L")&&((tn==="sente"&&r===0)||(tn==="gote"&&r===8)))continue;
    if(b==="N"&&((tn==="sente"&&r<=1)||(tn==="gote"&&r>=7)))continue;
    mv.push([r,c]);
  }}
  return mv;
}
function cpr(pc,fr,tr){
  if(!pc||isP(pc))return false;var b=bp(pc).toUpperCase();
  if(b==="K"||b==="G")return false;if(!PRO[pc])return false;
  return isS(pc)?(fr<=2||tr<=2):(fr>=6||tr>=6);
}
function mpr(pc,tr){
  if(!pc)return false;var b=bp(pc).toUpperCase();
  if(isS(pc)){if((b==="P"||b==="L")&&tr===0)return true;if(b==="N"&&tr<=1)return true;}
  else{if((b==="P"||b==="L")&&tr===8)return true;if(b==="N"&&tr>=7)return true;}
  return false;
}
function ich(bd,tn){
  var kg=tn==="sente"?"K":"k",kr=-1,kc=-1;
  for(var r=0;r<9;r++)for(var c=0;c<9;c++)if(bd[r][c]===kg){kr=r;kc=c;}
  if(kr<0)return false;
  for(var r=0;r<9;r++)for(var c=0;c<9;c++){
    var p=bd[r][c];if(!p)continue;
    if(tn==="sente"&&isS(p))continue;if(tn==="gote"&&isG(p))continue;
    var ms=gm(p,r,c,bd);for(var i=0;i<ms.length;i++)if(ms[i][0]===kr&&ms[i][1]===kc)return true;
  }
  return false;
}
function lm(bd,fr,fc,tr,tc,pc,tn,pr){
  var nb=cb(bd);nb[tr][tc]=pr?PRO[pc]:pc;nb[fr][fc]=null;return!ich(nb,tn);
}
function ld(bd,pc,tr,tc,tn){
  var nb=cb(bd);nb[tr][tc]=pc;
  if(bp(pc).toUpperCase()==="P"){
    var op=tn==="sente"?"gote":"sente";
    if(ich(nb,op)){var ok=false;
      for(var r=0;r<9&&!ok;r++)for(var c=0;c<9&&!ok;c++){
        var pp=nb[r][c];if(!pp)continue;
        if(op==="sente"&&!isS(pp))continue;if(op==="gote"&&!isG(pp))continue;
        var ms=gm(pp,r,c,nb);
        for(var i=0;i<ms.length;i++){var tb=cb(nb);tb[ms[i][0]][ms[i][1]]=pp;tb[r][c]=null;if(!ich(tb,op)){ok=true;break;}}
      }
      if(!ok)return false;
    }
  }
  return!ich(nb,tn);
}

/* タイマー */
function formatTime(sec){
  var m=Math.floor(sec/60);
  var s=sec%60;
  return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  if(over) return;
  startBGM();
  timerInterval=setInterval(function(){
    if(over||prm||cutinActive) return;
    if(T==="sente"){
      timerSente--;
      if(timerSente<=0){
        timerSente=0;
        var gn=document.getElementById("gi-name").textContent;
        over=gn+" の勝ち";
        clearInterval(timerInterval);
        timerInterval=null;
        renderTimers();renderBanners();

        showWinDialog("gote");
        return;
      }
    } else {
      timerGote--;
      if(timerGote<=0){
        timerGote=0;
        var sn=document.getElementById("si-name").textContent;
        over=sn+" の勝ち";
        clearInterval(timerInterval);
        timerInterval=null;
        renderTimers();renderBanners();

        showWinDialog("sente");
        return;
      }
    }
    renderTimers();
    if(over) renderBanners();

    // 残り5分切り警告（各プレイヤー1回ずつ）
    if(!sente5minWarned && timerSente<=300 && timerSente>0){
      sente5minWarned = true;
      playNokori5();
    }
    if(!gote5minWarned && timerGote<=300 && timerGote>0){
      gote5minWarned = true;
      playNokori5();
    }

    // 残り3分切り警告（各プレイヤー1回ずつ、カットイン中は保留）
    if(!sente3minWarned && timerSente<=180 && timerSente>0){
      sente3minWarned = true;
      pending3minWarning = true;
    }
    if(!gote3minWarned && timerGote<=180 && timerGote>0){
      gote3minWarned = true;
      pending3minWarning = true;
    }
    // カットイン中でなければ保留中の3分警告を再生
    if(pending3minWarning && !cutinActive){
      pending3minWarning = false;
      playNokori3();
    }

    // 残り1分切り警告（各プレイヤー1回ずつ）
    if(!sente1minWarned && timerSente<=60 && timerSente>0){
      sente1minWarned = true;
      playNokori1();
    }
    if(!gote1minWarned && timerGote<=60 && timerGote>0){
      gote1minWarned = true;
      playNokori1();
    }

    // 両者3分切りチェック
    if(!endgameCutinDone && timerSente<=180 && timerGote<=180){
      endgameCutinDone = true;
      playEndgameCutin();
    }
  }, 1000);
}

function renderTimers(){
  var $st=document.getElementById("sente-time");
  var $gt=document.getElementById("gote-time");
  var $sb=document.getElementById("sente-timer");
  var $gb=document.getElementById("gote-timer");

  // sente-timer = 画面下部, gote-timer = 画面上部
  // temaeSente=false → 先手タイマーを上、後手タイマーを下に表示
  if(furiResult && !furiResult.temaeSente){
    $st.textContent=formatTime(timerGote);  // 下=後手
    $gt.textContent=formatTime(timerSente); // 上=先手
    $sb.classList.toggle("active", T==="gote" && !over);
    $gb.classList.toggle("active", T==="sente" && !over);
    $sb.classList.toggle("danger", timerGote<=180);
    $gb.classList.toggle("danger", timerSente<=180);
  } else {
    $st.textContent=formatTime(timerSente);
    $gt.textContent=formatTime(timerGote);
    $sb.classList.toggle("active", T==="sente" && !over);
    $gb.classList.toggle("active", T==="gote" && !over);
    $sb.classList.toggle("danger", timerSente<=180);
    $gb.classList.toggle("danger", timerGote<=180);
  }
}

function render(){
  drawBoard();

  // 手番表示: temaeSente=true → 下=先手, temaeSente=false → 下=後手
  var bottomActive, topActive;
  if(furiResult && !furiResult.temaeSente){
    // 奥側が先手 → senteの番なら上がactive
    bottomActive = (T==="gote");
    topActive = (T==="sente");
  } else {
    // 手前側が先手(デフォルト) → senteの番なら下がactive
    bottomActive = (T==="sente");
    topActive = (T==="gote");
  }
  if(bottomActive){$si.classList.add("on");$gi.classList.remove("on");}
  else{$gi.classList.add("on");$si.classList.remove("on");}
  renderTimers();
  renderBanners();
  syncRowWidth();
}

function syncRowWidth(){
  requestAnimationFrame(function(){
    var tbl=document.getElementById("tbl");
    if(!tbl) return;
    var w=tbl.offsetWidth;
    if(w>0){
      document.querySelector(".gote-row").style.width=w+"px";
      document.querySelector(".sente-row").style.width=w+"px";
    }
  });
}

function renderBanners(){
  if(prm){
    $ov.classList.add("show");

  }else{
    $ov.classList.remove("show");
    $ov.classList.remove("gote-turn");
  }
}

function drawBoard(){
  var html="";
  for(var r=0;r<9;r++){
    html+="<tr>";
    for(var c=0;c<9;c++){
      var pc=B[r][c];
      var cls="";
      if(sel&&sel.t==="b"&&sel.r===r&&sel.c===c) cls+=" sel";
      var isTgt=false;
      for(var m=0;m<mvs.length;m++){if(mvs[m][0]===r&&mvs[m][1]===c){isTgt=true;break;}}
      if(isTgt){cls+=pc?" cap":" mv";}
      html+='<td class="'+cls.trim()+'" data-r="'+r+'" data-c="'+c+'">';
      if(pc) html+=komaHTML(pc, isG(pc));
      html+='</td>';
    }
    html+="</tr>";
  }
  $tb.innerHTML=html;
  var tds=$tb.querySelectorAll("td");
  for(var i=0;i<tds.length;i++) tds[i].addEventListener("click",onCellClick);
}

function dh(el,arr,pl){
  if(arr.length===0){
    el.innerHTML='<span class="hand-empty">持ち駒なし</span>';
    return;
  }
  var co={};for(var i=0;i<arr.length;i++){co[arr[i]]=(co[arr[i]]||0)+1;}
  var ks=Object.keys(co);
  var h="";
  for(var k=0;k<ks.length;k++){
    var pc=ks[k],cnt=co[pc];
    var cls="hand-koma";
    if(pl==="gote") cls+=" gote-hk";
    if(sel&&sel.t==="h"&&sel.p===pc&&T===pl) cls+=" sel";
    h+='<div class="'+cls+'" data-hp="'+pc+'" data-pl="'+pl+'">';
    h+='<div class="koma-bg"></div>';
    h+='<span class="koma-text">'+dn(pc)+'</span>';
    if(cnt>1) h+='<span class="hand-count">'+cnt+'</span>';
    h+='</div>';
  }
  el.innerHTML=h;
  var divs=el.querySelectorAll(".hand-koma");
  for(var i=0;i<divs.length;i++) divs[i].addEventListener("click",onHandClick);
}

/* イベント */
function onCellClick(e){
  if(reviewMode||over||prm)return;
  var td=e.currentTarget;
  var r=parseInt(td.getAttribute("data-r"));
  var c=parseInt(td.getAttribute("data-c"));
  var pc=B[r][c];

  if(sel){
    var hit=false;
    for(var i=0;i<mvs.length;i++){if(mvs[i][0]===r&&mvs[i][1]===c){hit=true;break;}}
    if(hit){
      if(sel.t==="h"){doDrop(sel.p,r,c);return;}
      var mp=B[sel.r][sel.c];
      if(cpr(mp,sel.r,r)){
        if(mpr(mp,r)){doMv(sel.r,sel.c,r,c,true);}
        else{prm={fr:sel.r,fc:sel.c,tr:r,tc:c};render();}
        return;
      }
      doMv(sel.r,sel.c,r,c,false);
      return;
    }
    // 合法手でないマスをタップした場合
    if(sel.t==="h" && !pc){
      // 持ち駒を選択中で空きマスだが合法手でない
      var bpc = sel.p.toUpperCase();
      if(bpc==="P"){
        // 二歩チェック
        var hasPawn=false;
        for(var rr=0;rr<9;rr++){var pp=B[rr][c];if(pp&&(pp==="P"||pp==="p")&&((T==="sente"&&isS(pp))||(T==="gote"&&isG(pp)))){hasPawn=true;break;}}
        if(hasPawn){showWarning("二歩です！\nこの筋には歩を打てません");sel=null;mvs=[];render();return;}
      }
      showWarning("ここには打てません");
      sel=null;mvs=[];render();return;
    }
    if(sel.t==="b" && !(pc&&((T==="sente"&&isS(pc))||(T==="gote"&&isG(pc))))){
      // 盤上の駒を選択中で合法手でないマスをタップ
      showWarning("そこには動けません");
      sel=null;mvs=[];render();return;
    }
  }

  // 相手の駒をタップした場合
  if(pc&&((T==="sente"&&isG(pc))||(T==="gote"&&isS(pc)))){
    showWarning("相手の駒です");
    sel=null;mvs=[];render();return;
  }

  if(pc&&((T==="sente"&&isS(pc))||(T==="gote"&&isG(pc)))){
    var raw=gm(pc,r,c,B);
    var leg=[];
    for(var i=0;i<raw.length;i++){
      var mr=raw[i][0],mc=raw[i][1];
      if(lm(B,r,c,mr,mc,pc,T,false)||(cpr(pc,r,mr)&&lm(B,r,c,mr,mc,pc,T,true))) leg.push(raw[i]);
    }
    if(leg.length===0){
      showWarning("この駒は動かせません");
      sel=null;mvs=[];render();return;
    }
    sel={t:"b",r:r,c:c};mvs=leg;render();
    if(!timerInterval) startTimer();
    return;
  }

  sel=null;mvs=[];render();
}

function onHandClick(e){
  if(reviewMode||over||prm)return;
  var div=e.currentTarget;
  var pc=div.getAttribute("data-hp");
  var pl=div.getAttribute("data-pl");
  if(T!==pl){
    showWarning("相手の持ち駒です");
    return;
  }
  var raw=gd(pc,B,T);
  var leg=[];
  for(var i=0;i<raw.length;i++){
    if(ld(B,pc,raw[i][0],raw[i][1],T)) leg.push(raw[i]);
  }
  if(leg.length===0){
    var bpc=pc.toUpperCase();
    if(bpc==="P") showWarning("この歩は打てません\n（二歩の可能性）");
    else showWarning("この駒は打てる場所がありません");
    sel=null;mvs=[];render();return;
  }
  sel={t:"h",p:pc};mvs=leg;render();
}

function doMv(fr,fc,tr,tc,pr){
  var pc=B[fr][fc];var cp=B[tr][tc];
  if(cp){var c=cap(cp);if(c)H[T].push(c);}
  B[tr][tc]=pr?PRO[pc]:pc;B[fr][fc]=null;
  if(tr===4 && tc===4){
    play5no5Cutin(T, function(){ endT(); });
  } else {
    endT();
  }
}
function doDrop(pc,tr,tc){
  B[tr][tc]=pc;
  var idx=H[T].indexOf(pc);if(idx>=0)H[T].splice(idx,1);
  if(tr===4 && tc===4){
    play5no5Cutin(T, function(){ endT(); });
  } else {
    endT();
  }
}

/* 5五カットイン演出 */
var $vid5Ov = document.getElementById("video-5no5");
var $vid5 = document.getElementById("video-5no5-player");

function play5no5Cutin(mover, callback){
  cutinActive = true;
  muteBGM();
  $vid5Ov.classList.remove("cutin","cutout","gote-winner");
  var moverIsTop;
  if(furiResult && !furiResult.temaeSente){
    moverIsTop = (mover==="sente");
  } else {
    moverIsTop = (mover==="gote");
  }
  if(moverIsTop) $vid5Ov.classList.add("gote-winner");
  $vid5Ov.classList.add("show","cutin");
  playSound("cutin", 1.5);

  $vid5.muted = true;
  $vid5.currentTime = 0;
  $vid5.play().catch(function(){});
  $vid5.pause();

  setTimeout(function(){
    $vid5.muted = false;
    $vid5.volume = 1;
    $vid5.currentTime = 0;
    $vid5.play().catch(function(){
      cleanup5no5(callback);
    });
  }, 600);

  $vid5.onended = function(){
    $vid5Ov.classList.remove("cutin");
    $vid5Ov.classList.add("cutout");
    setTimeout(function(){
      cleanup5no5(callback);
    }, 450);
  };

  $vid5.onerror = function(){
    cleanup5no5(callback);
  };
}

function cleanup5no5(callback){
  $vid5Ov.classList.remove("show","cutin","cutout","gote-winner");
  cutinActive = false;
  if(endgameBgmStarted){
    if(bgmEnabled) unmuteEndgameBGM();
  } else {
    if(bgmEnabled) unmuteBGM();
  }
  if(callback) callback();
}

var $vidEndOv = document.getElementById("video-endgame");
var $vidEndTop = document.getElementById("endgame-video-top");
var $vidEndBot = document.getElementById("endgame-video-bottom");

function playEndgameCutin(){
  cutinActive = true;
  $vidEndOv.classList.remove("cutin","cutout");
  $vidEndOv.classList.add("show","cutin");
  playSound("cutin", 1.5);

  // 通常BGMをミュート
  muteBGM();

  // 両方の動画をミュートで準備
  $vidEndTop.muted = true;
  $vidEndBot.muted = true;
  $vidEndTop.currentTime = 0;
  $vidEndBot.currentTime = 0;
  $vidEndTop.play().catch(function(){});
  $vidEndTop.pause();
  $vidEndBot.play().catch(function(){});
  $vidEndBot.pause();

  // カットイン後に動画再生（下側だけ音声ON）
  setTimeout(function(){
    $vidEndBot.muted = false;
    $vidEndBot.volume = 1;
    $vidEndTop.currentTime = 0;
    $vidEndBot.currentTime = 0;
    $vidEndTop.play().catch(function(){});
    $vidEndBot.play().catch(function(){});
  }, 600);

  // 動画終了 → カットアウト → 3分警告 → 終盤BGM開始
  $vidEndBot.onended = function(){
    $vidEndOv.classList.remove("cutin");
    $vidEndOv.classList.add("cutout");
    setTimeout(function(){
      $vidEndOv.classList.remove("show","cutin","cutout");
      cutinActive = false;
      // 通常BGM完全停止
      stopBGM();
      // 保留中の3分警告があれば再生、終了後に終盤BGM開始
      if(pending3minWarning){
        pending3minWarning = false;
        muteEndgameBGM();
        var src3 = playSound("nokori3", 2.0);
        // 終盤BGMをまず開始（ミュート状態）
        startEndgameBGM();
        muteEndgameBGM();
        if(src3){
          src3.onended = function(){
            if(bgmEnabled) unmuteEndgameBGM();
          };
        }
      } else {
        startEndgameBGM();
      }
    }, 450);
  };

  $vidEndBot.onerror = function(){
    $vidEndOv.classList.remove("show","cutin","cutout");
    cutinActive = false;
    stopBGM();
    if(pending3minWarning){
      pending3minWarning = false;
      startEndgameBGM();
      muteEndgameBGM();
      var src3 = playSound("nokori3", 2.0);
      if(src3){
        src3.onended = function(){
          if(bgmEnabled) unmuteEndgameBGM();
        };
      }
    } else {
      startEndgameBGM();
    }
  };
}

function endT(){
  sel=null;mvs=[];prm=null;
  playKomaSound();
  var nx=T==="sente"?"gote":"sente";T=nx;
  takeSnapshot(); // 局面を保存
  chk=ich(B,nx);
  if(chk) playOuteSound();
  chkEnd(nx);
  render();
  if(!over && !timerInterval) startTimer();
}

function chkEnd(tn){
  var found=false;
  for(var r=0;r<9&&!found;r++)for(var c=0;c<9&&!found;c++){
    var p=B[r][c];if(!p)continue;
    if(tn==="sente"&&!isS(p))continue;if(tn==="gote"&&!isG(p))continue;
    var ms=gm(p,r,c,B);
    for(var i=0;i<ms.length;i++){
      if(lm(B,r,c,ms[i][0],ms[i][1],p,tn,false)||(cpr(p,r,ms[i][0])&&lm(B,r,c,ms[i][0],ms[i][1],p,tn,true))){found=true;break;}
    }
  }
  if(!found){
    var uq=[];var hd=H[tn];for(var i=0;i<hd.length;i++){if(uq.indexOf(hd[i])<0)uq.push(hd[i]);}
    for(var k=0;k<uq.length&&!found;k++){
      var ds=gd(uq[k],B,tn);
      for(var d=0;d<ds.length&&!found;d++){if(ld(B,uq[k],ds[d][0],ds[d][1],tn))found=true;}
    }
  }
  if(!found){
    var winner = tn==="sente" ? "gote" : "sente";
    var winnerName = winner==="sente" ? document.getElementById("si-name").textContent : document.getElementById("gi-name").textContent;
    over = chk ? winnerName + " の勝ち" : "引き分け";
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}

    if(chk) setTimeout(function(){ showWinDialog(winner); }, 300);
  }
}

/* ===== 検討モード ===== */
function enterReviewMode(){
  reviewMode=true;
  reviewIdx=snapshots.length-1;
  document.querySelector(".board-area").classList.add("review-mode");
  document.getElementById("review-bar").classList.add("show");
  document.getElementById("review-bar-gote").classList.add("show");
  showReviewAt(reviewIdx);
}

function showReviewAt(idx){
  if(idx<0) idx=0;
  if(idx>=snapshots.length) idx=snapshots.length-1;
  reviewIdx=idx;
  var snap=snapshots[idx];
  // 盤面を描画（読み取り専用）
  var $tbody=document.getElementById("tb");
  var html="";
  for(var r=0;r<9;r++){
    html+="<tr>";
    for(var c=0;c<9;c++){
      var pc=snap.board[r][c];
      html+='<td>';
      if(pc) html+=komaHTML(pc, isG(pc));
      html+='</td>';
    }
    html+="</tr>";
  }
  $tbody.innerHTML=html;
  // 持ち駒を描画
  drawReviewHand(document.getElementById("sh"), snap.hands.sente, "sente");
  drawReviewHand(document.getElementById("gh"), snap.hands.gote, "gote");
  // 手番表示
  var $si=document.getElementById("si");
  var $gi=document.getElementById("gi");
  var bActive, tActive;
  if(furiResult && !furiResult.temaeSente){
    bActive = (snap.turn==="gote");
    tActive = (snap.turn==="sente");
  } else {
    bActive = (snap.turn==="sente");
    tActive = (snap.turn==="gote");
  }
  if(bActive){$si.classList.add("on");$gi.classList.remove("on");}
  else{$gi.classList.add("on");$si.classList.remove("on");}
  // 情報（両方のバーを更新）
  var infoText = idx+"手目 / "+(snapshots.length-1)+"手";
  document.getElementById("rev-info").textContent = infoText;
  document.getElementById("rev-info-gote").textContent = infoText;
  // ボタン状態（両方のバーのボタンを更新）
  var allRevBtns = document.querySelectorAll("[data-action]");
  for(var b=0; b<allRevBtns.length; b++){
    var act = allRevBtns[b].getAttribute("data-action");
    if(act==="first"||act==="prev") allRevBtns[b].disabled=(idx===0);
    if(act==="next"||act==="last") allRevBtns[b].disabled=(idx>=snapshots.length-1);
  }
  syncRowWidth();
}

function drawReviewHand(el,arr,pl){
  if(arr.length===0){
    el.innerHTML='<span class="hand-empty">持ち駒なし</span>';
    return;
  }
  var co={};for(var i=0;i<arr.length;i++){co[arr[i]]=(co[arr[i]]||0)+1;}
  var ks=Object.keys(co);
  var h="";
  for(var k=0;k<ks.length;k++){
    var pc=ks[k],cnt=co[pc];
    var cls="hand-koma";
    if(pl==="gote") cls+=" gote-hk";
    h+='<div class="'+cls+'">';
    h+='<div class="koma-bg"></div>';
    h+='<span class="koma-text">'+dn(pc)+'</span>';
    if(cnt>1) h+='<span class="hand-count">'+cnt+'</span>';
    h+='</div>';
  }
  el.innerHTML=h;
}

/* 検討バー統一ハンドラ（先手側・後手側両方） */
function handleReviewAction(action){
  if(action==="first") showReviewAt(0);
  else if(action==="prev") showReviewAt(reviewIdx-1);
  else if(action==="next") showReviewAt(reviewIdx+1);
  else if(action==="last") showReviewAt(snapshots.length-1);
  else if(action==="exit"){
    reviewMode = false;
    document.querySelector(".board-area").classList.remove("review-mode");
    document.getElementById("review-bar").classList.remove("show");
    document.getElementById("review-bar-gote").classList.remove("show");
    document.getElementById("game-screen").classList.remove("show");
    document.getElementById("title-screen").style.display = "flex";
    furiDone = false;
    furiResult = null;
    document.getElementById("furi-result").textContent = "";
    document.getElementById("furi-btn").textContent = "振る";
    var pieces = document.querySelectorAll(".furi-koma");
    for(var i=0; i<pieces.length; i++){
      pieces[i].classList.remove("landed","tokin","shaking");
      pieces[i].querySelector(".koma-text").textContent = "歩";
    }
  }
}

// 両方のバーのボタンにイベント設定
var revBtns = document.querySelectorAll("[data-action]");
for(var i=0; i<revBtns.length; i++){
  revBtns[i].addEventListener("click", function(){
    playButtonSound();
    handleReviewAction(this.getAttribute("data-action"));
  });
}

var $vidOv = document.getElementById("video-ov");

function playResignVideo(winner){
  cutinActive = true;
  // BGMは handleResign の stopBGM() で既に止まっている
  $vidOv.classList.remove("cutin","cutout","gote-winner");
  var winnerIsTop;
  if(furiResult && !furiResult.temaeSente){
    winnerIsTop = (winner==="sente");
  } else {
    winnerIsTop = (winner==="gote");
  }
  if(winnerIsTop) $vidOv.classList.add("gote-winner");

  $vidOv.classList.add("show","cutin");
  playSound("cutin", 1.5);

  touryouVideo.muted = true;
  touryouVideo.currentTime = 0;
  touryouVideo.play().catch(function(){});
  touryouVideo.pause();

  setTimeout(function(){
    touryouVideo.muted = false;
    touryouVideo.volume = 1;
    touryouVideo.currentTime = 0;
    touryouVideo.play().catch(function(){
      cleanupVideo(winner);
    });
  }, 600);

  touryouVideo.onended = function(){
    $vidOv.classList.remove("cutin");
    $vidOv.classList.add("cutout");
    setTimeout(function(){
      cleanupVideo(winner);
    }, 450);
  };

  touryouVideo.onerror = function(){

  };
}

function cleanupVideo(winner){
  $vidOv.classList.remove("show","cutin","cutout","gote-winner");
  cutinActive = false;
  showWinDialog(winner);
}

function handleResign(who){
  if(over) return;
  var winner = who==="sente" ? "gote" : "sente";
  // 勝者の名前を取得（位置を考慮）
  var winnerName;
  if(furiResult && !furiResult.temaeSente){
    // 奥=先手, 手前=後手
    winnerName = winner==="sente" ? document.getElementById("gi-name").textContent : document.getElementById("si-name").textContent;
  } else {
    // 手前=先手, 奥=後手
    winnerName = winner==="sente" ? document.getElementById("si-name").textContent : document.getElementById("gi-name").textContent;
  }
  over = winnerName + " の勝ち";
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  stopBGM();
  render();
  playResignVideo(winner);
}

init();
/* ゲーム画面は非表示のまま。タイトル画面が最初に表示される */

/* ===== タイトル画面・振り駒 ===== */
var furiResult = null; // {sente:"name", gote:"name"}
var furiDone = false;

document.getElementById("furi-btn").addEventListener("click", function(){
  var btn = this;

  // === 状態2: 「対局開始」として押された場合 ===
  if(furiDone && furiResult){
    playButtonSound();
    if(furiResult.temaeSente){
      document.querySelector("#si .turn-role").textContent = "☗ 先手";
      document.getElementById("si-name").textContent = furiResult.sente;
      document.querySelector("#gi .turn-role").textContent = "☖ 後手";
      document.getElementById("gi-name").textContent = furiResult.gote;
    } else {
      document.querySelector("#si .turn-role").textContent = "☖ 後手";
      document.getElementById("si-name").textContent = furiResult.gote;
      document.querySelector("#gi .turn-role").textContent = "☗ 先手";
      document.getElementById("gi-name").textContent = furiResult.sente;
    }
    document.getElementById("title-screen").style.display = "none";
    document.getElementById("game-screen").classList.add("show");
    TIMER_TOTAL = selectedTime;
    init();
    render();

    unlockAudio(function(){
      playStartSound();

      if(selectedTime <= 180){
        // 3分: カットイン演出→残り3分音声→終盤BGMでスタート
        // フラグを先にセット（init後なのでリセットされている）
        sente5minWarned = true;
        gote5minWarned = true;
        sente3minWarned = true;
        gote3minWarned = true;
        endgameCutinDone = true;
        setTimeout(function(){
          playEndgameCutin();
          // カットイン終了後の処理はplayEndgameCutin内で行われる
          // （3分警告→終盤BGM→タイマー開始）
          // pending3minWarningをセットしてカットイン後に再生させる
          pending3minWarning = true;
        }, 500);
        // タイマーはカットイン終了後に開始（cutinActive中はタイマー停止するので先に開始してOK）
        startTimer();

      } else if(selectedTime <= 300){
        // 5分: 残り5分音声→通常BGMでスタート
        sente5minWarned = true;
        gote5minWarned = true;
        startBGM();
        startTimer();
        setTimeout(function(){ playNokori5(); }, 800);

      } else {
        // 10分: 通常通り
        startBGM();
        startTimer();
      }
    });
    return;
  }

  // === 状態1: 「振る」として押された場合 ===
  unlockAudio(function(){
    playButtonSound();
  });
  btn.disabled = true;
  furiDone = false;
  document.getElementById("furi-result").textContent = "";

  // 5枚の駒を振る
  var pieces = document.querySelectorAll(".furi-koma");
  for(var i=0; i<pieces.length; i++){
    pieces[i].classList.remove("landed","tokin");
    pieces[i].querySelector(".koma-text").textContent = "歩";
    pieces[i].classList.add("shaking");
  }

  // 1秒後に結果決定
  setTimeout(function(){
    var tokinCount = 0;
    var results = [];
    for(var i=0; i<5; i++){
      var isTokin = Math.random() < 0.5;
      results.push(isTokin);
      if(isTokin) tokinCount++;
    }

    // 順次着地アニメーション
    for(var i=0; i<5; i++){
      (function(idx, isTokin){
        setTimeout(function(){
          var koma = pieces[idx];
          koma.classList.remove("shaking");
          koma.classList.add("landed");
          if(isTokin){
            koma.classList.add("tokin");
            koma.querySelector(".koma-text").textContent = "と";
          }

          // 最後の駒が着地したら結果表示
          if(idx === 4){
            setTimeout(function(){
              var name1 = document.getElementById("name1").value.trim() || "手前側";
              var name2 = document.getElementById("name2").value.trim() || "奥側";
              var resultEl = document.getElementById("furi-result");

              if(tokinCount >= 3){
                // 手前側が先手
                furiResult = {sente: name1, gote: name2, temaeSente: true};
                resultEl.textContent = "と金" + tokinCount + "枚 → " + name1 + " が先手！";
              } else {
                // 奥側が先手
                furiResult = {sente: name2, gote: name1, temaeSente: false};
                resultEl.textContent = "歩" + (5 - tokinCount) + "枚 → " + name2 + " が先手！";
              }
              furiDone = true;
              // ボタンを「対局開始」に変更
              btn.textContent = "対局開始";
              btn.disabled = false;
            }, 200);
          }
        }, idx * 150);
      })(i, results[i]);
    }
  }, 1000);
});

/* BGMトグル（両方のボタンを同期） */
var bgmEnabled = true;
var bgmBtnSente = document.getElementById("bgm-toggle-sente");
var bgmBtnGote = document.getElementById("bgm-toggle-gote");

function toggleBGM(){
  playButtonSound();
  if(bgmEnabled){
    muteBGM();
    muteEndgameBGM();
    bgmEnabled = false;
    bgmBtnSente.classList.remove("on"); bgmBtnSente.classList.add("off");
    bgmBtnGote.classList.remove("on"); bgmBtnGote.classList.add("off");
  } else {
    bgmEnabled = true;
    bgmBtnSente.classList.remove("off"); bgmBtnSente.classList.add("on");
    bgmBtnGote.classList.remove("off"); bgmBtnGote.classList.add("on");
    if(endgameBgmStarted){
      unmuteEndgameBGM();
    } else if(bgmStarted){
      unmuteBGM();
    } else if(!over && !reviewMode){
      startBGM();
    }
  }
}
